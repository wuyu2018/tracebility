# 前置网关：TLS 可在本文件扩展 443；当前仅对外提供 HTTP 反代（不依赖证书即可启动）
# 规则：/api -> backend:8080，其余 -> frontend:80（由前端容器内 Nginx 处理 SPA / 静态资源）

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443;
    ssl on;
    server_name _;

    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 10M;
    client_body_timeout 60s;

    # 与 docker-compose 中 edge 的 healthcheck 一致
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "healthy\n";
    }

    # 后端 API（Spring 映射在 /api/**）
    location /api {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering off;
        proxy_request_buffering off;
    }

    # 前端静态资源 + SPA（tools.html、index.html 等由 frontend 容器处理）
    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
