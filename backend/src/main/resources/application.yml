spring:
  application:
    name: food-traceability

  datasource:
    url: jdbc:mysql://localhost:3306/food_traceability?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root  # 修改为你的MySQL用户名
    password: ''  # 修改为你的MySQL密码
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update # 使用update而不是create，避免数据丢失
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    database-platform: org.hibernate.dialect.MySQL8Dialect
    open-in-view: false

  sql:
    init:
      mode: always  # 启动时执行data.sql
      platform: mysql
      continue-on-error: true  # 遇到错误继续执行

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

logging:
  level:
    org.springframework.jdbc: DEBUG      # 数据库操作日志
    org.hibernate.SQL: DEBUG            # SQL语句
    org.hibernate.type: TRACE           # 参数值
    com.zaxxer.hikari: DEBUG            # 连接池日志
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
management:
  endpoints:
    web:
      exposure:
        include: health,info,mappings,beans,env
  endpoint:
    health:
      show-details: always
    mappings:
      enabled: true