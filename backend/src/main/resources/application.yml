server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/food_traceability?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  sql:
    init:
      mode: always

logging:
  level:
    com.foodtraceability: INFO
    org.hibernate.SQL: DEBUG


