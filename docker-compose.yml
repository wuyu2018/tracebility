version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: food-traceability-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-food_traceability}
      MYSQL_USER: ${MYSQL_USER:-app_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-app_password}
    ports:
      - "${MYSQL_EXPOSED_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - food-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      args:
        SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
    container_name: food-traceability-backend
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-food_traceability}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-app_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-app_password}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - food-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      args:
        NGINX_HOST: ${NGINX_HOST:-localhost}
        NGINX_PORT: ${NGINX_PORT:-80}
    container_name: food-traceability-frontend
    ports:
      - "${FRONTEND_EXPOSED_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - food-network
    restart: unless-stopped

networks:
  food-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
